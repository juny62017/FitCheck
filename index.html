<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>FitCheck</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="main-box">

        <div class="top-section">

            <h1>
                FitCheck
            </h1>

            <p class="main-text">
                A soft and simple BMI calculator
            </p>

        </div>

        <div class="input-section">

            <label class="section-label">
                Height (cm)
            </label>

            <input
                type="number"
                id="heightInput"
                placeholder="Enter your height"
            >

        </div>

        <div class="input-section">

            <label class="section-label">
                Weight (kg)
            </label>

            <input
                type="number"
                id="weightInput"
                placeholder="Enter your weight"
            >

        </div>

        <div class="input-section">

            <label class="section-label">
                Age
            </label>

            <input
                type="number"
                id="ageInput"
                placeholder="Enter your age"
            >

        </div>

        <div class="input-section">

            <label class="section-label">
                Gender
            </label>

            <div class="gender-box">

                <label class="gender-item">

                    <input
                        type="radio"
                        name="gender"
                        checked
                    >

                    Male

                </label>

                <label class="gender-item">

                    <input
                        type="radio"
                        name="gender"
                    >

                    Female

                </label>

            </div>

        </div>

        <div class="result-section">

            <p class="result-label">
                Your BMI
            </p>

            <h2 class="result-number">
                00.0
            </h2>

            <p class="result-text">
                Healthy Range
            </p>

            <div class="bmi-meter">

                <div class="bmi-fill"></div>

            </div>

        </div>

        <div class="button-section">

            <button class="calculate-btn">
                Calculate BMI
            </button>

            <button class="reset-btn">
                Reset
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
